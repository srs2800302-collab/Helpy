name: fixi_mobile
description: Fixi mobile app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  intl: ^0.20.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - .env
