name: API CI

on:
  push:
    branches:
      - main
      - stage-0-foundation
      - stage-1-auth
      - stage-1-1-api-bootstrap
      - stage-1-2-prisma-domain
  pull_request:

jobs:
  api-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package.json

      - name: Install dependencies
        run: npm install

      - name: Prisma format
        run: npm run prisma:format

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
