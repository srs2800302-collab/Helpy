name: API CI

on:
  push:
    branches:
      - main
      - stage-0-foundation
  pull_request:

jobs:
  api-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify API files
        run: |
          test -f package.json
          test -f prisma/schema.prisma
          test -f .env.example
