name: Android CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      # 🔥 ВАЖНО: создаём .env
      - name: Create .env
        run: |
          echo "API_BASE_URL=https://fixi-edge-api.srs2800302.workers.dev/api/v1" > .env

      # Shared debug keystore so CI signs with the same certificate as local
      # builds - its SHA-1 is registered as the Android OAuth client in
      # Google Cloud Console, so a per-runner debug key would break
      # Google Sign-In with DEVELOPER_ERROR.
      - name: Restore debug keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > android/debug.keystore

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: helpy-release-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
