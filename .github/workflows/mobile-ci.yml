name: Mobile CI

on:
  push:
    branches:
      - main
      - stage-0-foundation
      - stage-10-auth-guards
      - stage-m1-mobile-foundation
      - stage-m2-mobile-auth-routing
      - stage-m3-client-create-job
      - stage-m4-master-marketplace
      - stage-m5-client-select-master
      - stage-m6-chat-execution
      - stage-m7-reviews-polish
      - stage-m8-mobile-cleanup
  pull_request:

jobs:
  mobile-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
