name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        flutter-version: [3.22.0]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------
      # Setup Node (backend & admin)
      # -------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: apps/api
        run: npm ci

      - name: Lint backend
        working-directory: apps/api
        run: npm run lint

      - name: Run backend tests
        working-directory: apps/api
        run: npm test

      - name: Build backend Docker image
        working-directory: apps/api
        run: |
          docker build -t helppy-api .

      # -------------------
      # Setup Flutter (mobile)
      # -------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable

      - name: Flutter Pub Get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter Analyze
        working-directory: apps/mobile
        run: flutter analyze

      - name: Flutter Test with coverage
        working-directory: apps/mobile
        run: flutter test --coverage

      # -------------------
      # Setup Node (admin frontend)
      # -------------------
      - name: Install admin dependencies
        working-directory: apps/admin
        run: npm ci

      - name: Lint admin
        working-directory: apps/admin
        run: npm run lint

      - name: Run admin tests
        working-directory: apps/admin
        run: npm test

      - name: Build admin (static site)
        working-directory: apps/admin
        run: npm run build

      # -------------------
      # Verify health endpoint
      # -------------------
      - name: Verify API health endpoint
        run: |
          # Start API locally (if needed) – assuming a start script exists
          if [ -f apps/api/package.json ]; then
            npm --prefix apps/api run start &
            API_PID=$!
            # Wait for server to be up
            for i in {1..10}; do
              curl -s http://localhost:3000/health && break || sleep 2
            done
            # Stop server
            kill $API_PID || true
          fi


      # -------------------
      # Optional: Upload coverage reports (requires codecov token)
      # -------------------
      - name: Upload Flutter coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: apps/mobile/coverage/lcov.info
          flags: flutter
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload backend coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
