name: Repo Check

on:
  push:
    branches:
      - main
      - stage-s1-ci-stabilization-from-m8
      - stage-s2-ci-fixes
      - stage-s3-ci-finalize
  pull_request:

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          test -d apps/mobile
          test -d apps/api
          test -d apps/admin
          test -d packages/shared-types
          test -d infrastructure
          test -d docs
          test -f README.md
          test -f package.json
