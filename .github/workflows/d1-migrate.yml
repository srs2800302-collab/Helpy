name: D1 Migrate

on:
  workflow_dispatch:

jobs:
  inspect-migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List D1 migration files
        run: |
          echo "D1 migration files:"
          find apps/api/db/migrations -maxdepth 1 -type f -name "*.sql" | sort

      - name: Validate migration ordering
        run: |
          files="$(find apps/api/db/migrations -maxdepth 1 -type f -name "*.sql" | sort)"
          test -n "$files"
          echo "$files"

      - name: Check canonical schema exists
        run: |
          test -f apps/api/db/schema.sql
          test -f apps/api/db/MIGRATION_SYSTEM.md
          test -f apps/api/db/README.md
