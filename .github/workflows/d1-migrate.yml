name: D1 Migrate

on:
  workflow_dispatch:
    inputs:
      bootstrap_registry:
        description: "Apply 0000_migration_registry.sql before reading remote state"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      apply_migrations:
        description: "Apply pending D1 migrations after read-only checks"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  inspect-migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm install

      - name: Dry-run D1 migration apply path
        working-directory: apps/api
        run: npm run db:dry-run

      - name: Install Wrangler
        working-directory: apps/api
        run: npm install -g wrangler

      - name: Bootstrap D1 migration registry
        if: ${{ github.event.inputs.bootstrap_registry == 'true' }}
        working-directory: apps/api
        run: npm run db:bootstrap-registry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Read remote D1 migration state
        working-directory: apps/api
        run: npm run db:remote-state
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Read remote applied migration ids
        working-directory: apps/api
        run: npm run db:remote-applied
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply pending D1 migrations
        if: ${{ github.event.inputs.apply_migrations == 'true' }}
        working-directory: apps/api
        run: npm run db:migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
