name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, admin]
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Build Docker image
        run: |
          if [ "${{ matrix.component }}" = "api" ]; then
            docker build -t myregistry/helpy-${{ matrix.component }}:${{ github.ref_name }} -f apps/api/Dockerfile .
          else
            docker build -t myregistry/helpy-${{ matrix.component }}:${{ github.ref_name }} -f apps/admin/Dockerfile .
          fi

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: myregistry
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push myregistry/helpy-${{ matrix.component }}:${{ github.ref_name }}
