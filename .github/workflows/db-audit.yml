name: DB Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repo DB audit
        run: |
          echo "=== GIT ==="
          git status -sb
          git log -1 --oneline

          echo
          echo "=== PRISMA SCHEMA ==="
          test -f apps/api/prisma/schema.prisma && sed -n '1,260p' apps/api/prisma/schema.prisma || true

          echo
          echo "=== PRISMA MIGRATIONS ==="
          find apps/api/prisma -maxdepth 3 -type f | sort || true

          echo
          echo "=== BACKEND TABLE/SQL REFERENCES ==="
          grep -RInE "CREATE TABLE|ALTER TABLE|DROP TABLE|SELECT|INSERT|UPDATE|DELETE|FROM |JOIN " apps/api/src --include="*.ts" | sed -n '1,500p'

      - name: Live D1 schema audit
        working-directory: apps/api
        run: |
          echo "=== D1 TABLES ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT name, sql
          FROM sqlite_master
          WHERE type='table'
          ORDER BY name;
          "

          echo
          echo "=== D1 INDEXES ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT name, tbl_name, sql
          FROM sqlite_master
          WHERE type='index'
          ORDER BY tbl_name, name;
          "

          echo
          echo "=== D1 FOREIGN KEYS ==="
          for t in users client_profiles master_profiles jobs offers job_photos chat_messages payments payment_methods payment_customers payment_events reviews disputes translation_tasks; do
            echo "--- $t ---"
            npx -y wrangler d1 execute fixi-db --remote --command "PRAGMA foreign_key_list($t);" || true
          done

          echo
          echo "=== D1 COLUMNS ==="
          for t in users client_profiles master_profiles jobs offers job_photos chat_messages payments payment_methods payment_customers payment_events reviews disputes translation_tasks; do
            echo "--- $t ---"
            npx -y wrangler d1 execute fixi-db --remote --command "PRAGMA table_info($t);" || true
          done

          echo
          echo "=== D1 APPLIED MIGRATIONS ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT id, applied_at
          FROM schema_migrations
          ORDER BY id;
          "

          echo
          echo "=== D1 COUNTS ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT
            (SELECT COUNT(*) FROM users) AS users,
            (SELECT COUNT(*) FROM client_profiles) AS client_profiles,
            (SELECT COUNT(*) FROM master_profiles) AS master_profiles,
            (SELECT COUNT(*) FROM jobs) AS jobs,
            (SELECT COUNT(*) FROM offers) AS offers,
            (SELECT COUNT(*) FROM job_photos) AS job_photos,
            (SELECT COUNT(*) FROM chat_messages) AS chat_messages,
            (SELECT COUNT(*) FROM payments) AS payments,
            (SELECT COUNT(*) FROM reviews) AS reviews,
            (SELECT COUNT(*) FROM disputes) AS disputes,
            (SELECT COUNT(*) FROM translation_tasks) AS translation_tasks;
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Live D1 integrity audit
        working-directory: apps/api
        run: |
          echo "=== D1 FK MODE ==="
          npx -y wrangler d1 execute fixi-db --remote --json --command "PRAGMA foreign_keys;" | jq -c '.'

          echo
          echo "=== D1 ORPHAN CHECKS ==="
          npx -y wrangler d1 execute fixi-db --remote --json --command "SELECT 'client_profiles.user_id' AS check_name, COUNT(*) AS orphans FROM client_profiles cp LEFT JOIN users u ON u.id = cp.user_id WHERE u.id IS NULL UNION ALL SELECT 'master_profiles.user_id', COUNT(*) FROM master_profiles mp LEFT JOIN users u ON u.id = mp.user_id WHERE u.id IS NULL UNION ALL SELECT 'jobs.client_user_id', COUNT(*) FROM jobs j LEFT JOIN users u ON u.id = j.client_user_id WHERE u.id IS NULL UNION ALL SELECT 'offers.job_id', COUNT(*) FROM offers o LEFT JOIN jobs j ON j.id = o.job_id WHERE j.id IS NULL UNION ALL SELECT 'offers.master_user_id', COUNT(*) FROM offers o LEFT JOIN users u ON u.id = o.master_user_id WHERE o.master_user_id IS NOT NULL AND u.id IS NULL UNION ALL SELECT 'chat_messages.job_id', COUNT(*) FROM chat_messages cm LEFT JOIN jobs j ON j.id = cm.job_id WHERE j.id IS NULL UNION ALL SELECT 'job_photos.job_id', COUNT(*) FROM job_photos jp LEFT JOIN jobs j ON j.id = jp.job_id WHERE j.id IS NULL UNION ALL SELECT 'payments.job_id', COUNT(*) FROM payments p LEFT JOIN jobs j ON j.id = p.job_id WHERE j.id IS NULL UNION ALL SELECT 'reviews.job_id', COUNT(*) FROM reviews r LEFT JOIN jobs j ON j.id = r.job_id WHERE j.id IS NULL UNION ALL SELECT 'disputes.job_id', COUNT(*) FROM disputes d LEFT JOIN jobs j ON j.id = d.job_id WHERE j.id IS NULL;" | jq -c '.[0].results[]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Live D1 compact counts
        working-directory: apps/api
        run: |
          echo "=== D1 COUNTS COMPACT ==="
          npx -y wrangler d1 execute fixi-db --remote --json --command "SELECT (SELECT COUNT(*) FROM users) AS users, (SELECT COUNT(*) FROM client_profiles) AS client_profiles, (SELECT COUNT(*) FROM master_profiles) AS master_profiles, (SELECT COUNT(*) FROM jobs) AS jobs, (SELECT COUNT(*) FROM offers) AS offers, (SELECT COUNT(*) FROM job_photos) AS job_photos, (SELECT COUNT(*) FROM chat_messages) AS chat_messages, (SELECT COUNT(*) FROM payments) AS payments, (SELECT COUNT(*) FROM reviews) AS reviews, (SELECT COUNT(*) FROM disputes) AS disputes, (SELECT COUNT(*) FROM translation_tasks) AS translation_tasks;" | jq -c '.[0].results[0]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
