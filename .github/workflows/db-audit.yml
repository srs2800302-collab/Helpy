name: DB Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repo DB audit
        run: |
          echo "=== GIT ==="
          git status -sb
          git log -1 --oneline

          echo
          echo "=== PRISMA SCHEMA ==="
          if test -f apps/api/prisma/schema.prisma; then
            echo "schema.prisma exists"
            grep -nE "^(datasource|generator|model|enum) " apps/api/prisma/schema.prisma || true
          else
            echo "schema.prisma missing"
          fi

          echo
          echo "=== PRISMA MIGRATIONS ==="
          find apps/api/prisma -maxdepth 3 -type f | sort || true

          echo
          echo "=== BACKEND TABLE/SQL REFERENCES ==="
          grep -RInE \
            "CREATE TABLE|ALTER TABLE|DROP TABLE|SELECT|INSERT|UPDATE|DELETE|FROM |JOIN " \
            apps/api/src --include="*.ts" \
            | sed -n '1,500p'

      - name: Canonical schema drift check
        working-directory: apps/api
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3
          npm run db:drift

      - name: Live D1 schema audit
        working-directory: apps/api
        run: |
          echo "=== D1 TABLES ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT name, sql
          FROM sqlite_master
          WHERE type='table'
          ORDER BY name;
          "

          echo
          echo "=== D1 INDEXES ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT name, tbl_name, sql
          FROM sqlite_master
          WHERE type='index'
          ORDER BY tbl_name, name;
          "

          echo
          echo "=== D1 FOREIGN KEYS ==="
          TABLES="
            users
            client_profiles
            master_profiles
            jobs
            offers
            job_photos
            chat_messages
            payments
            payment_methods
            payment_customers
            payment_events
            reviews
            disputes
            translation_tasks
          "
          for t in $TABLES; do
            echo "--- $t ---"
            npx -y wrangler d1 execute fixi-db --remote --command "PRAGMA foreign_key_list($t);" || true
          done

          echo
          echo "=== D1 COLUMNS ==="
          for t in $TABLES; do
            echo "--- $t ---"
            npx -y wrangler d1 execute fixi-db --remote --command "PRAGMA table_info($t);" || true
          done

          echo
          echo "=== D1 APPLIED MIGRATIONS ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT id, applied_at
          FROM schema_migrations
          ORDER BY id;
          "

          echo
          echo "=== D1 COUNTS ==="
          npx -y wrangler d1 execute fixi-db --remote --command "
          SELECT
            (SELECT COUNT(*) FROM users) AS users,
            (SELECT COUNT(*) FROM client_profiles) AS client_profiles,
            (SELECT COUNT(*) FROM master_profiles) AS master_profiles,
            (SELECT COUNT(*) FROM jobs) AS jobs,
            (SELECT COUNT(*) FROM offers) AS offers,
            (SELECT COUNT(*) FROM job_photos) AS job_photos,
            (SELECT COUNT(*) FROM chat_messages) AS chat_messages,
            (SELECT COUNT(*) FROM payments) AS payments,
            (SELECT COUNT(*) FROM reviews) AS reviews,
            (SELECT COUNT(*) FROM disputes) AS disputes,
            (SELECT COUNT(*) FROM translation_tasks) AS translation_tasks;
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Live D1 integrity audit
        working-directory: apps/api
        run: |
          echo "=== D1 FK MODE ==="
          npx -y wrangler d1 execute fixi-db --remote --json --command "PRAGMA foreign_keys;" | jq -c '.'

          echo
          echo "=== D1 ORPHAN CHECKS ==="
          npx -y wrangler d1 execute fixi-db --remote --file db/d1_integrity_orphans.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Live D1 compact counts
        working-directory: apps/api
        run: |
          echo "=== D1 COUNTS COMPACT ==="
          SQL="$(cat db/d1_compact_counts.sql)"
          npx -y wrangler d1 execute fixi-db --remote --json --command "$SQL" \
            | jq -c '.[0].results[0]'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
