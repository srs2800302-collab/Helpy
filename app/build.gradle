plugins {
    id 'com.android.application'
}

android {
    namespace 'com.helpy.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.helpy.app"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
